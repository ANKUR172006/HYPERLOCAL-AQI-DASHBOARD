services:
  - type: web
    name: hyperlocal-aqi
    env: docker
    healthCheckPath: /v1/health
    disk:
      name: aqi-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: RENDER_DISK_PATH
        value: "/var/data"
      # Keep external integrations on (CPCB/Open-Meteo/Nominatim/FIRMS) unless you want offline demos.
      - key: EXTERNAL_APIS_ENABLED
        value: "true"
      - key: CPCB_SOURCE_MODE
        value: "hybrid"
      - key: ENABLE_EXTENDED_INGESTION
        value: "true"
      # For a single Render web service, keep the scheduler on so data stays fresh.
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: ENABLE_XGBOOST_FORECASTING
        value: "true"
      - key: FORECAST_MODEL
        value: "auto"
      - key: LIVE_DATA_STRICT
        value: "false"
      - key: CPCB_FILTER_CITY
        value: ""
      - key: CPCB_FILTER_STATE
        value: ""
      - key: CPCB_API_LIMIT
        value: "100"
      - key: CPCB_API_MAX_PAGES
        value: "6"
      - key: IDW_NEAREST_N
        value: "3"
      - key: IDW_RADIUS_KM
        value: "80"
      - key: IDW_POWER
        value: "3.0"
      # Secrets (set these in Render dashboard when prompted)
      - key: FIRMS_MAP_KEY
        sync: false
      - key: CPCB_API_KEY
        sync: false
      - key: NASA_API_KEY
        sync: false
