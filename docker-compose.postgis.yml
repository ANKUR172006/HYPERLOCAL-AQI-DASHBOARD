services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aqi_postgis
    ports:
      - "5432:5432"
    volumes:
      - aqi_postgis_data:/var/lib/postgresql/data
      - ./backend/db/schema_postgis.sql:/docker-entrypoint-initdb.d/001_postgis.sql:ro

volumes:
  aqi_postgis_data:

